services:
  # PostgreSQL
  postgres_db:
    image: postgres:16
    container_name: kori_postgres
    env_file:
      - ./backend/.env
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  #Redis
  redis:
    image: redis:7.4-alpine
    container_name: kori_redis
    env_file:
      - ./backend/.env
    restart: always
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  #RedisInsight (Visula GUI for Redis)
  redis_insight:
    image: redis/redisinsight:latest
    container_name: kori_redis_insight
    env_file:
      - ./backend/.env
    restart: always
    ports:
      - "${REDIS_INSIGHT_PORT}:5540"
    depends_on:
      - redis

  #Mailpit(The local OTP catcher)
  mailpit:
    image: axllent/mailpit:latest
    container_name: kori_mailpit
    env_file:
      - ./backend/.env
    restart: always
    ports:
      - "${MAILPORT_UI_PORT}:8025"
      - "${MAILPORT_SMTP_PORT}:1025"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
